<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect width="512" height="512" rx="120" fill="url(#shine)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="90" r="80" fill="white" opacity="0.06"/>
  <circle cx="80" cy="430" r="60" fill="white" opacity="0.04"/>

  <!-- Route path (curved road) -->
  <path d="M120 380 Q180 300 256 280 Q340 258 400 180" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.15"/>
  <path d="M120 380 Q180 300 256 280 Q340 258 400 180" stroke="white" stroke-width="3" stroke-linecap="round" stroke-dasharray="12 8" fill="none" opacity="0.3"/>

  <!-- Location pins on route -->
  <circle cx="160" cy="345" r="10" fill="white" opacity="0.5"/>
  <circle cx="256" cy="278" r="10" fill="white" opacity="0.6"/>
  <circle cx="365" cy="205" r="10" fill="white" opacity="0.5"/>

  <!-- Truck body -->
  <rect x="170" y="155" width="120" height="75" rx="12" fill="white" opacity="0.95"/>
  <!-- Truck cargo top highlight -->
  <rect x="175" y="160" width="110" height="8" rx="4" fill="#059669" opacity="0.15"/>
  <!-- Recycle symbol -->
  <g transform="translate(230, 188)" fill="none" stroke="#059669" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <path d="M0-14L6-4H-6Z"/>
    <path d="M12 8L6-4" />
    <path d="M-12 8L-6-4"/>
    <path d="M12 8H-12"/>
  </g>
  <!-- Truck cabin -->
  <path d="M290 175 L330 175 C340 175 348 182 352 190 L362 218 C364 224 360 230 354 230 L290 230 Z" fill="white" opacity="0.95"/>
  <!-- Cabin window -->
  <rect x="300" y="183" width="35" height="22" rx="5" fill="#059669" opacity="0.3"/>
  <!-- Headlight -->
  <rect x="354" y="210" width="8" height="12" rx="4" fill="#fbbf24" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="210" cy="236" r="20" fill="#064e3b"/>
  <circle cx="210" cy="236" r="9" fill="white" opacity="0.9"/>
  <circle cx="210" cy="236" r="4" fill="#064e3b"/>
  <circle cx="340" cy="236" r="20" fill="#064e3b"/>
  <circle cx="340" cy="236" r="9" fill="white" opacity="0.9"/>
  <circle cx="340" cy="236" r="4" fill="#064e3b"/>

  <!-- Ground -->
  <line x1="80" y1="258" x2="440" y2="258" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.12"/>

  <!-- Leaf accent -->
  <g transform="translate(400, 100)" opacity="0.4">
    <path d="M0-20 C12-12 16 0 10 14 C4 8-4 8-10 14 C-16 0-12-12 0-20Z" fill="white"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#064e3b" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- SW text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" opacity="0.9" letter-spacing="-2">SW</text>
  <text x="256" y="455" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" opacity="0.4" letter-spacing="6">ROUTE</text>
</svg>
