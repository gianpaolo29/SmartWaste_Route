I<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="256" y2="512">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#064e3b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
  </g>

  <!-- Route path background -->
  <path d="M80 430 Q170 350 256 310 Q350 270 420 190 Q450 155 455 110" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.06"/>
  <path d="M80 430 Q170 350 256 310 Q350 270 420 190 Q450 155 455 110" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 10" fill="none" opacity="0.12"/>

  <!-- Route waypoints -->
  <circle cx="130" cy="395" r="4" fill="white" opacity="0.15"/>
  <circle cx="256" cy="310" r="4.5" fill="white" opacity="0.2"/>
  <circle cx="395" cy="210" r="4" fill="white" opacity="0.15"/>

  <!-- Decorative orbs -->
  <circle cx="420" cy="85" r="65" fill="white" opacity="0.035"/>
  <circle cx="85" cy="440" r="50" fill="white" opacity="0.025"/>

  <!-- ====== LOCATION PIN with RECYCLE ====== -->
  <g filter="url(#shadow)" transform="translate(256, 200)">
    <!-- Pin outer (white) -->
    <path d="M0-125 C-70-125 -115-78 -115-18 C-115 46 0 140 0 140 C0 140 115 46 115-18 C115-78 70-125 0-125Z" fill="white" opacity="0.97"/>
    <!-- Pin inner (green gradient) -->
    <path d="M0-108 C-58-108 -98-68 -98-14 C-98 40 0 120 0 120 C0 120 98 40 98-14 C98-68 58-108 0-108Z" fill="url(#bg)"/>

    <!-- Recycle symbol — clean 3-arrow loop -->
    <g transform="translate(0, -18)" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Arrow 1: top-right going down-right -->
      <path d="M4-40 L28 2" opacity="0.95"/>
      <path d="M-4-40 L-28 2" opacity="0.95"/>
      <!-- Arrow 2: right going left-down -->
      <path d="M28 2 L44 30" opacity="0.95"/>
      <path d="M44 30 L-2 30" opacity="0.95"/>
      <!-- Arrow 3: left going up -->
      <path d="M-2 30 L-44 30" opacity="0.95"/>
      <path d="M-44 30 L-28 2" opacity="0.95"/>
    </g>
    <!-- Arrowheads -->
    <g transform="translate(0, -18)" fill="white" opacity="0.95">
      <!-- Top arrowhead -->
      <polygon points="0,-52 -8,-38 8,-38"/>
      <!-- Bottom-right arrowhead -->
      <polygon points="8,30 -4,22 -4,38" transform="rotate(0)"/>
      <!-- Bottom-left arrowhead -->
      <polygon points="-8,30 4,22 4,38" transform="rotate(0) translate(-44,0) rotate(180, -8, 30)"/>
    </g>
  </g>

  <!-- ====== BRANDING TEXT ====== -->
  <text x="256" y="415" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="800" fill="white" opacity="0.95" letter-spacing="2">SW</text>
  <text x="256" y="452" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="white" opacity="0.4" letter-spacing="10">ROUTE</text>

  <!-- Accent underline -->
  <rect x="216" y="464" width="80" height="2" rx="1" fill="white" opacity="0.12"/>
</svg>
